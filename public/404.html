<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Link Not Found | piik.me</title>
    <link rel="icon" type="image/png" href="/assets/images/favicon.png">
    <link rel="stylesheet" href="/css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            background-color: var(--bg-primary, #09090b);
            color: var(--text-primary);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .not-found-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            flex: 1;
            text-align: center;
            padding: 2rem;
            position: relative;
            z-index: 10;
        }
        
        .not-found-icon {
            font-size: 5rem;
            color: var(--accent-purple, #06b6d4);
            margin-bottom: 1.5rem;
            animation: float 3s ease-in-out infinite;
            filter: drop-shadow(0 10px 15px rgba(6, 182, 212, 0.3));
        }
        
        .not-found-title {
            font-size: 3rem;
            font-weight: 800;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #ffffff, var(--accent-purple, #06b6d4));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.02em;
        }
        
        .not-found-desc {
            font-size: 1.1rem;
            color: var(--text-secondary, #94a3b8);
            margin-bottom: 2.5rem;
            max-width: 500px;
            line-height: 1.6;
        }
        
        .not-found-actions {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .btn-home {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 0.75rem 1.5rem;
            background-color: var(--accent-purple, #06b6d4);
            color: white;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px -1px rgba(6, 182, 212, 0.2), 0 2px 4px -1px rgba(6, 182, 212, 0.1);
            border: none;
            cursor: pointer;
        }
        
        .btn-home:hover {
            background-color: var(--accent-purple-hover, #0891b2);
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(6, 182, 212, 0.3), 0 4px 6px -2px rgba(6, 182, 212, 0.15);
            color: white;
        }
        
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }
    </style>
</head>
<body>
    <div class="app-bg">
        <div class="app-orb app-orb-1"></div>
        <div class="app-orb app-orb-2"></div>
        <div class="app-orb app-orb-3"></div>
    </div>
    
    <div class="not-found-container">
        <div class="not-found-icon">
            <i class="fas fa-link-slash"></i>
        </div>
        <h1 class="not-found-title">Link Not Found</h1>
        <p class="not-found-desc" aria-live="polite">
            Oops! The link you're trying to access might be broken, expired, or doesn't exist anymore.<br><br>
            Redirecting to homepage in <strong id="countdown" style="color: var(--accent-purple, `#06b6d4`);">5</strong> seconds...
        </p>
        <div class="not-found-actions">
            <a href="/" class="btn-home">
                <i class="fas fa-home"></i> Return to Homepage Now
            </a>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const countdownEl = document.getElementById('countdown');
            let timeLeft = 5;
            
            const timer = setInterval(() => {
                timeLeft--;
                countdownEl.textContent = timeLeft;
                
                if (timeLeft <= 0) {
                    clearInterval(timer);
                    window.location.href = '/';
                }
            }, 1000);
        });
    </script>
</body>
</html>
